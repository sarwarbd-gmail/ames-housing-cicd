name: Ames Housing - CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Run tests ────────────────────────────────────────────────────
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install xgboost scikit-learn pandas numpy pytest

      - name: Run tests
        run: pytest tests/ -v

  # ── Job 2: Train model ──────────────────────────────────────────────────
  train:
    name: Train model
    runs-on: ubuntu-latest
    needs: test          # only runs if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install xgboost scikit-learn pandas numpy

      - name: Train model
        run: python src/train.py

      - name: Show metrics
        run: cat metrics/metrics.json

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            model/model.pkl
            metrics/metrics.json

  # ── Job 3: Deploy ───────────────────────────────────────────────────────
  deploy:
    name: Deploy model
    runs-on: ubuntu-latest
    needs: train
    if: github.ref == 'refs/heads/main'   # skip on pull requests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download trained model
        uses: actions/download-artifact@v4
        with:
          name: trained-model

      - name: Show metrics before deploying
        run: cat metrics/metrics.json

      - name: Deploy
        run: |
          echo "Deploying model to production..."
          echo "Real deployment options:"
          echo "  Option A - Docker + Kubernetes:"
          echo "    docker build -t housing-model:latest ."
          echo "    docker push your-registry/housing-model:latest"
          echo "    kubectl set image deployment/housing-model app=housing-model:latest"
          echo ""
          echo "  Option B - AWS Lambda:"
          echo "    zip -r model.zip model/ src/predict.py"
          echo "    aws lambda update-function-code --function-name housing-model --zip-file fileb://model.zip"
          echo ""
          echo "  Option C - Hugging Face Spaces / Streamlit Cloud:"
          echo "    git push to the Spaces repo"
          echo ""
          echo "Deployment complete."
